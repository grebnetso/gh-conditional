name: Matrix Demo
on: push
jobs:
  build:
    continue-on-error: true
    strategy:
      matrix:
        node: [12, 14, 16]
        os: [ubuntu-latest, windows-latest, macos-latest]
        include: # This is adding an additional combination that is just node 18 and ubuntu and not 12 unbuntu, windows, and mac
          - node: 18
            os: ubuntu-latest
        exclude: # This is excluding the combination of node 12 and windows
          - node: 12
            os: windows-latest
    runs-on: ${{ matrix.os }}
    steps:
      - name: Get code
        uses: actions/checkout@v3
      - name: Install NodeJS
        uses: actions/setup-node@v3
        with:
          node-version: ${{ matrix.node }}
      - name: Install dependencies
        run: npm ci
      - name: Build Project
        run: npm run build
